<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Microsoft 365 Features Calculator | Frontrow Technology</title>
  <meta name="description" content="Find out what Microsoft 365 features you're paying for but not using. Free interactive tool for Australian businesses.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main id="calculator-app" class="calculator">

    <nav class="progress" aria-label="Calculator progress">
      <div class="progress-step active" data-step="1" aria-label="Step 1: Size"></div>
      <div class="progress-line" data-line="1"></div>
      <div class="progress-step" data-step="2" aria-label="Step 2: Plan"></div>
      <div class="progress-line" data-line="2"></div>
      <div class="progress-step" data-step="3" aria-label="Step 3: Priorities"></div>
      <div class="progress-line" data-line="3"></div>
      <div class="progress-step" data-step="4" aria-label="Step 4: Features"></div>
    </nav>

    <div id="steps-container"></div>

    <div class="step-nav">
      <button type="button" class="btn-back" id="btn-back" aria-label="Go back" hidden>Back</button>
      <button type="button" class="btn btn-primary btn-next" id="btn-next" disabled aria-label="Continue to next step">Next</button>
    </div>

  </main>

  <footer style="text-align:center;padding:1rem;font-size:0.75rem;color:#9ca3af;">
    <p class="disclaimer">Prices current as of March 2026, ex-GST. Verify with Microsoft for the latest pricing.</p>
    <p style="margin-top:0.5rem;">
      <a href="https://frontrow.technology" target="_blank" rel="noopener" style="color:#9ca3af;text-decoration:none;">Powered by Frontrow Technology</a>
    </p>
  </footer>

  <noscript>
    <div style="max-width:600px;margin:2rem auto;padding:1.5rem;text-align:center;font-family:sans-serif;color:#374151;">
      <p>This calculator requires JavaScript to run. Please enable JavaScript or visit
        <a href="https://frontrow.technology/contact">frontrow.technology/contact</a> to speak with our team.</p>
    </div>
  </noscript>

  <script src="js/data.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      M365Calculator.init();
      M365UI.init();
    });
  </script>

</body>
</html>
